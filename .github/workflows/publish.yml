name: Publish Novus pack

# Builds the distributable pack from master and deploys it to GitHub Pages.
# This runs entirely on GitHub's servers — no local machine required. Push a
# change to master (or run manually) and friends' launchers get it on next launch.

on:
  push:
    branches: [ master ]
  workflow_dispatch:        # lets you trigger a build by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one publish at a time; a newer push supersedes an in-flight one.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4

      - name: Set up Go (to build packwiz)
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Build distributable pack
        run: |
          chmod +x build.sh
          PACKWIZ="$(go env GOPATH)/bin/packwiz" ./build.sh

      # Ship the self-updating Prism instance alongside the pack tree, so it lives
      # at a stable URL (https://b1ll3b0b.github.io/novus/novus.zip) instead of
      # being re-attached to every GitHub Release. It's static across releases.
      - name: Add self-updating instance (novus.zip) to the Pages tree
        run: |
          chmod +x make-prism-instance.sh
          ./make-prism-instance.sh dist/pack

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pack

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
